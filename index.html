<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#191815">
  <meta name="description" content="从64杯经典鸡尾酒中逐轮选择，选出你的冠军。">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SHAKE OFF">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>SHAKE OFF｜鸡尾酒淘汰赛</title>
  <style>
    :root{--ink:#191815;--paper:#f4efe5;--cream:#fffbf2;--orange:#ee5b2b;--lime:#d9ef4f;--line:rgba(25,24,21,.18)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--paper);color:var(--ink);font-family:"Arial Narrow","PingFang SC","Microsoft YaHei",sans-serif}button{-webkit-tap-highlight-color:transparent;font:inherit}.shell{min-height:100vh;overflow:hidden;background:linear-gradient(rgba(25,24,21,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(25,24,21,.035) 1px,transparent 1px),var(--paper);background-size:28px 28px}
    .topbar{height:70px;padding:0 max(20px,env(safe-area-inset-left));display:flex;align-items:center;justify-content:space-between;background:var(--ink);color:var(--cream)}.brand{display:flex;align-items:center;gap:11px}.brand-mark{display:grid;place-items:center;width:40px;height:40px;border:1px solid rgba(255,255,255,.65);border-radius:50%;color:var(--lime);font-size:11px;font-weight:900;letter-spacing:-.08em;transform:rotate(-8deg)}.brand-name{font-size:12px;font-weight:900;line-height:.86;letter-spacing:.16em}.reset{display:flex;gap:7px;padding:9px 13px;border:1px solid rgba(255,255,255,.32);border-radius:999px;color:var(--cream);background:transparent}
    .hero{padding:44px 20px 38px}.eyebrow,.round-kicker,.overview-kicker{margin:0 0 16px;font-size:11px;font-weight:900;letter-spacing:.15em}.eyebrow:before{content:"";display:inline-block;width:28px;height:2px;margin-right:9px;vertical-align:middle;background:var(--orange)}h1{margin:0;font-size:clamp(50px,15vw,76px);font-weight:950;letter-spacing:-.085em;line-height:.88}h1 em{color:var(--orange);font-family:Georgia,"Songti SC",serif;font-weight:400}.hero-copy{margin:24px 0 0;max-width:580px;color:rgba(25,24,21,.66);font-size:14px;line-height:1.75}.score{margin-top:28px;padding:16px 18px;display:grid;grid-template-columns:1fr auto;align-items:end;gap:3px 16px;border:1px solid var(--ink);background:var(--lime);box-shadow:7px 7px 0 var(--ink)}.score span{font-size:10px;font-weight:900;letter-spacing:.13em}.score strong{grid-row:1/3;grid-column:2;font-size:38px;line-height:1}.score small{font-size:14px}.track{grid-column:1/-1;height:4px;margin-top:8px;overflow:hidden;background:rgba(25,24,21,.2)}.track i,.round-progress i{display:block;height:100%;background:var(--ink);transition:width .2s}
    .round-nav{position:sticky;top:0;z-index:10;background:var(--ink);box-shadow:0 8px 28px rgba(0,0,0,.13)}.round-scroll{display:flex;overflow-x:auto;scrollbar-width:none}.round-scroll::-webkit-scrollbar{display:none}.round-tab{position:relative;flex:0 0 104px;height:72px;padding:14px;border:0;border-right:1px solid rgba(255,255,255,.13);color:rgba(255,255,255,.44);background:transparent;text-align:left}.round-tab span{display:block;margin-bottom:4px;font-size:8px;font-weight:900;letter-spacing:.14em}.round-tab strong{font-size:15px}.round-tab i{position:absolute;top:14px;right:11px;font-size:10px;font-style:normal}.round-tab.active{color:var(--ink);background:var(--lime)}.round-tab.complete:not(.active){color:var(--lime)}.round-tab:disabled{opacity:.45}
    .arena,.overview{padding:44px 20px}.round-heading,.overview-heading{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:28px}.round-kicker,.overview-kicker{margin-bottom:7px;color:var(--orange)}h2{margin:0;font-size:36px;letter-spacing:-.06em;line-height:1}.round-progress{width:82px;text-align:right}.round-progress span{font-size:13px;font-weight:900}.round-progress div{height:4px;margin-top:8px;background:rgba(25,24,21,.12)}.round-progress i{background:var(--orange)}
    .match-stage{position:relative}.duel{padding:12px;border:1px solid var(--ink);background:var(--cream);box-shadow:7px 7px 0 rgba(25,24,21,.13)}.instruction{margin:2px 0 13px;font-size:10px;font-weight:900;letter-spacing:.15em;text-align:center}.options{position:relative;display:grid;grid-template-columns:1fr;gap:10px}.option,.empty{min-height:156px;padding:23px;display:flex;flex-direction:column;align-items:flex-start;justify-content:space-between;border:1px solid var(--ink);color:var(--ink);background:var(--paper);text-align:left}.option.selected,.option:active{color:var(--cream);background:var(--orange)}.option:nth-child(2).selected,.option:nth-child(2):active{color:var(--ink);background:var(--lime)}.seed,.pick-label{font-size:9px;font-weight:900;letter-spacing:.12em}.option strong{font-size:clamp(34px,10vw,50px);letter-spacing:-.06em;line-height:1}.versus{position:absolute;top:50%;left:50%;z-index:2;display:grid;place-items:center;width:46px;height:46px;border:1px solid var(--ink);border-radius:50%;background:var(--cream);font-family:Georgia,serif;font-size:13px;font-style:italic;font-weight:700;transform:translate(-50%,-50%) rotate(-8deg)}.empty{align-items:center;justify-content:center;color:rgba(25,24,21,.38)}.arrow{position:absolute;bottom:-58px;z-index:3;width:42px;height:42px;border:1px solid var(--ink);border-radius:50%;color:var(--ink);background:var(--paper);font-size:20px}.arrow.prev{left:0}.arrow.next{right:0}.arrow:disabled{opacity:.2}.zones{display:flex;gap:7px;margin:22px 55px 0;padding:3px 0 8px;overflow-x:auto}.zones button{flex:0 0 36px;width:36px;height:36px;border:1px solid var(--line);border-radius:50%;color:rgba(25,24,21,.46);background:transparent;font-size:10px;font-weight:800}.zones button.picked{border-color:var(--ink);color:var(--ink);background:var(--lime)}.zones button.active{outline:2px solid var(--orange);outline-offset:2px}
    .champion{position:relative;min-height:440px;padding:55px 20px;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid var(--ink);color:var(--cream);background:var(--ink);text-align:center}.champion:before,.champion:after{content:"";position:absolute;width:210px;height:210px;border:1px solid rgba(217,239,79,.35);border-radius:50%}.champion:before{left:-70px;top:-80px}.champion:after{right:-70px;bottom:-80px}.champion p,.champion>span{margin:0;color:var(--lime);font-size:10px;font-weight:900;letter-spacing:.18em}.champion h2{margin:12px 0;color:var(--lime);font-family:Georgia,"Songti SC",serif;font-size:clamp(54px,16vw,96px);font-style:italic;font-weight:400}.trophy{margin-top:28px;color:var(--orange);font-size:48px}.champion button{z-index:1;margin-top:32px;padding:10px 17px;border:1px solid rgba(255,255,255,.35);border-radius:999px;color:var(--cream);background:transparent}
    .overview{border-top:1px solid var(--ink);background:var(--cream)}.overview-heading>span{display:none}.grid{display:grid;grid-template-columns:1fr;gap:11px}.mini{border:1px solid var(--ink);background:var(--paper)}.mini-title{width:100%;padding:9px 13px;border:0;border-bottom:1px solid var(--ink);color:rgba(25,24,21,.58);background:transparent;font-size:9px;font-weight:900;letter-spacing:.12em;text-align:left}.mini-pick,.mini-empty{width:100%;min-height:48px;padding:10px 12px;display:grid;grid-template-columns:28px 1fr 18px;align-items:center;gap:7px;border:0;border-bottom:1px solid var(--line);color:var(--ink);background:transparent;text-align:left}.mini-pick:last-child,.mini-empty:last-child{border-bottom:0}.mini-pick.winner{background:var(--lime)}.mini-pick span{color:rgba(25,24,21,.45);font-size:9px}.mini-pick strong{overflow:hidden;font-size:13px;text-overflow:ellipsis;white-space:nowrap}.mini-pick i{font-style:normal;font-weight:900}.mini-empty{display:flex;color:rgba(25,24,21,.32);font-size:12px}.footer{padding:22px 20px calc(22px + env(safe-area-inset-bottom));display:flex;justify-content:space-between;color:rgba(255,255,255,.66);background:var(--ink);font-size:10px;font-weight:800;letter-spacing:.12em}.saved{position:fixed;right:16px;bottom:max(16px,env(safe-area-inset-bottom));z-index:20;padding:10px 14px;border:1px solid var(--lime);border-radius:999px;color:var(--cream);background:var(--ink);box-shadow:4px 4px 0 var(--orange);font-size:11px;font-weight:800;opacity:0;transform:translateY(8px);pointer-events:none;transition:.2s}.saved.show{opacity:1;transform:none}
    @media(min-width:760px){.topbar{padding-inline:5vw}.hero{padding:70px 5vw 60px;display:grid;grid-template-columns:1fr 190px;align-items:end;gap:48px}h1{font-size:clamp(70px,8vw,112px)}.score{display:block;margin:0;padding:22px}.score strong{display:block;margin:12px 0 4px;font-size:50px}.round-scroll{display:grid;grid-template-columns:repeat(6,1fr)}.round-tab{width:auto;flex:auto;height:86px;padding:18px 20px}.arena,.overview{padding:70px 5vw}.options{grid-template-columns:1fr 1fr}.option,.empty{min-height:220px;padding:42px}.arrow{position:static;width:52px;height:52px}.match-stage{display:grid;grid-template-columns:52px minmax(0,1fr) 52px;align-items:center;gap:22px}.zones{margin-inline:74px}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.overview-heading>span{display:block;color:rgba(25,24,21,.48);font-size:12px}.footer{padding-inline:5vw}}
    @media(min-width:1100px){.hero,.arena{max-width:1440px;margin:auto}.grid{grid-template-columns:repeat(4,minmax(0,1fr))}.overview>*{max-width:1296px;margin-inline:auto}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar"><div class="brand"><span class="brand-mark">S/O</span><span class="brand-name">SHAKE<br>OFF</span></div><button class="reset" id="reset">↺ 重新开始</button></header>
    <section class="hero" id="top"><div><p class="eyebrow">64 杯经典鸡尾酒 · 单败淘汰赛</p><h1>你的味蕾，<br><em>今天站哪一边？</em></h1><p class="hero-copy">每一杯都值得被认真选择。点选你更爱的那一杯，赢家会自动晋级，直到选出今晚的唯一冠军。</p></div><div class="score"><span>MY BRACKET</span><strong id="score">00<small>/63</small></strong><span>已完成选择</span><div class="track"><i id="score-track"></i></div></div></section>
    <nav class="round-nav"><div class="round-scroll" id="rounds"></div></nav>
    <section class="arena"><div class="round-heading"><div><p class="round-kicker" id="round-kicker"></p><h2 id="round-title"></h2></div><div class="round-progress"><span id="round-score"></span><div><i id="round-track"></i></div></div></div><div id="stage"></div><div class="zones" id="zones"></div></section>
    <section class="overview"><div class="overview-heading"><div><p class="overview-kicker">ALL MATCHUPS</p><h2>本轮对阵总览</h2></div><span>点击名字可直接更改选择</span></div><div class="grid" id="grid"></div></section>
    <footer class="footer"><span>SHAKE / OFF</span><span>喝酒要开心，也要适量。</span><span>64 → 1</span></footer>
  </main>
  <div class="saved" id="saved">✓ 已保存在本机</div>
  <script>
    (() => {
      const names=["马天尼","Vesper","曼哈顿","尼格罗尼","古典","威士忌酸","玛格丽特","大都会","边车","教父","大吉利","亚历山大","花花公子","床笫之间","一脱成名","飞行","Rob Roy","萨泽拉克","遗言","蜂之膝","老广场","盘尼西林","Hanky Panky","查理卓别林","DLB","雪国","猴腺","特立尼达酸","竹子","燕尾服","法兰西75","纸飞机","莫吉托","金汤力","长岛冰茶","龙舌兰日出","自由古巴","新加坡司令","椰林飘香","血腥玛丽","金菲士","汤姆科林斯","迈泰","莫斯科骡子","螺丝起子","海风","Sex on the beach","僵尸","斯普莫尼","贝利尼","荆棘","南方","凯匹琳娜","三叶草俱乐部","拉莫斯金菲士","爱尔兰咖啡","帕洛玛","阿佩罗橙光","皮斯科酸","美国佬","白色佳人","亡者复生2号","大都会","丛林鸟"];
      const drinks=names.map((name,i)=>({id:`c${i+1}`,name}));
      const rounds=[{label:"32强",short:"R32",matches:32},{label:"16强",short:"R16",matches:16},{label:"8强",short:"R8",matches:8},{label:"4强",short:"R4",matches:4},{label:"决赛",short:"FINAL",matches:2},{label:"冠军",short:"CHAMP",matches:1}];
      const KEY="shake-off-offline-picks-v1";let picks={};let activeRound=0;let activeMatch=0;let toastTimer;
      const $=id=>document.getElementById(id),key=(r,m)=>`${r}-${m}`;
      const entrant=(r,index)=>r===0?drinks[index]:drinks.find(d=>d.id===picks[key(r-1,index)]);
      const complete=r=>Array.from({length:rounds[r].matches},(_,m)=>!!picks[key(r,m)]).every(Boolean);
      const safeLoad=()=>{try{picks=JSON.parse(localStorage.getItem(KEY)||"{}")||{}}catch(_){picks={}}};
      const save=()=>{try{localStorage.setItem(KEY,JSON.stringify(picks));const t=$("saved");t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),1100)}catch(_){}};
      function choose(drink,r=activeRound,m=activeMatch,advance=true){const next={};Object.entries(picks).forEach(([k,v])=>{if(Number(k.split("-")[0])<=r)next[k]=v});next[key(r,m)]=drink.id;picks=next;save();render();if(advance&&r===activeRound&&m===activeMatch){setTimeout(()=>{if(activeMatch<rounds[activeRound].matches-1)activeMatch++;else if(activeRound<rounds.length-1){activeRound++;activeMatch=0;scrollTo({top:document.querySelector(".round-nav").offsetTop,behavior:"smooth"})}render()},220)}}
      function openRound(r){if(r>0&&!complete(r-1))return;activeRound=r;const first=Array.from({length:rounds[r].matches},(_,m)=>m).find(m=>!picks[key(r,m)]);activeMatch=first===undefined?0:first;render();scrollTo({top:document.querySelector(".round-nav").offsetTop,behavior:"smooth"})}
      function render(){
        const total=Object.keys(picks).length,round=rounds[activeRound],done=Array.from({length:round.matches},(_,m)=>!!picks[key(activeRound,m)]).filter(Boolean).length;
        $("score").innerHTML=`${String(total).padStart(2,"0")}<small>/63</small>`;$("score-track").style.width=`${total/63*100}%`;$("round-kicker").textContent=`${round.short} · ROUND ${String(activeRound+1).padStart(2,"0")}`;$("round-title").textContent=activeRound===5?"冠军之战":`${round.label} · 第${activeMatch+1}区`;$("round-score").textContent=`${done}/${round.matches}`;$("round-track").style.width=`${done/round.matches*100}%`;
        $("rounds").innerHTML=rounds.map((r,i)=>`<button class="round-tab ${i===activeRound?"active":""} ${complete(i)?"complete":""}" data-round="${i}" ${i>0&&!complete(i-1)?"disabled":""}><span>${r.short}</span><strong>${r.label}</strong><i>${complete(i)?"✓":String(i+1).padStart(2,"0")}</i></button>`).join("");
        $("rounds").querySelectorAll("button").forEach(b=>b.onclick=()=>openRound(Number(b.dataset.round)));
        const champ=drinks.find(d=>d.id===picks[key(5,0)]);
        if(champ&&activeRound===5){$("stage").innerHTML=`<section class="champion"><p>THE LAST DRINK STANDING</p><div class="trophy">♕</div><h2>${champ.name}</h2><span>你的鸡尾酒冠军</span><button id="rechamp">重选冠军</button></section>`;$("rechamp").onclick=()=>{delete picks[key(5,0)];save();render()}}
        else{const pair=[entrant(activeRound,activeMatch*2),entrant(activeRound,activeMatch*2+1)],picked=picks[key(activeRound,activeMatch)];$("stage").innerHTML=`<div class="match-stage"><button class="arrow prev" ${activeMatch===0?"disabled":""}>←</button><div class="duel"><p class="instruction">选择一杯晋级</p><div class="options">${pair.map((d,i)=>d?`<button class="option ${picked===d.id?"selected":""}" data-id="${d.id}"><span class="seed">NO. ${String(activeMatch*2+i+1).padStart(2,"0")}</span><strong>${d.name}</strong><span class="pick-label">${picked===d.id?"已晋级 ✓":"选择这杯 ↗"}</span></button>`:`<div class="empty">等待上一轮结果</div>`).join("")}<span class="versus">VS</span></div></div><button class="arrow next" ${activeMatch===round.matches-1?"disabled":""}>→</button></div>`;const buttons=$("stage").querySelectorAll(".option");buttons.forEach(b=>b.onclick=()=>choose(drinks.find(d=>d.id===b.dataset.id)));$("stage").querySelector(".prev").onclick=()=>{activeMatch=Math.max(0,activeMatch-1);render()};$("stage").querySelector(".next").onclick=()=>{activeMatch=Math.min(round.matches-1,activeMatch+1);render()}}
        $("zones").innerHTML=Array.from({length:round.matches},(_,m)=>`<button class="${m===activeMatch?"active":""} ${picks[key(activeRound,m)]?"picked":""}" data-match="${m}">${String(m+1).padStart(2,"0")}</button>`).join("");$("zones").querySelectorAll("button").forEach(b=>b.onclick=()=>{activeMatch=Number(b.dataset.match);render()});
        $("grid").innerHTML=Array.from({length:round.matches},(_,m)=>{const pair=[entrant(activeRound,m*2),entrant(activeRound,m*2+1)],picked=picks[key(activeRound,m)];return`<article class="mini"><button class="mini-title" data-open="${m}">第 ${String(m+1).padStart(2,"0")} 区</button>${pair.map((d,i)=>d?`<button class="mini-pick ${picked===d.id?"winner":""}" data-id="${d.id}" data-match="${m}"><span>${String(m*2+i+1).padStart(2,"0")}</span><strong>${d.name}</strong><i>${picked===d.id?"✓":""}</i></button>`:`<div class="mini-empty">等待晋级</div>`).join("")}</article>`}).join("");$("grid").querySelectorAll(".mini-title").forEach(b=>b.onclick=()=>{activeMatch=Number(b.dataset.open);render();document.querySelector(".arena").scrollIntoView({behavior:"smooth"})});$("grid").querySelectorAll(".mini-pick").forEach(b=>b.onclick=()=>choose(drinks.find(d=>d.id===b.dataset.id),activeRound,Number(b.dataset.match),false));
        const current=$("rounds").querySelector(".active");if(current)current.scrollIntoView({inline:"center",block:"nearest"});
      }
      $("reset").onclick=()=>{if(confirm("确定要清空所有选择，重新开始吗？")){picks={};activeRound=0;activeMatch=0;try{localStorage.removeItem(KEY)}catch(_){}render()}};
      safeLoad();const first=rounds.findIndex((_,i)=>!complete(i));activeRound=first===-1?5:first;const firstMatch=Array.from({length:rounds[activeRound].matches},(_,m)=>m).find(m=>!picks[key(activeRound,m)]);activeMatch=firstMatch===undefined?0:firstMatch;render();
    })();
  </script>
  <script>if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}</script>
</body>
</html>
